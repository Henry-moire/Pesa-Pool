<!DOCTYPE html>
<html>
<head>
  <title>Pesa Pool</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'">
  <link rel="stylesheet" href="renderer.css">
  <script src="node_modules/jspdf/dist/jspdf.umd.min.js"></script>
  <script src="renderer.js" defer></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <button id="btn-new-event">+ New Event</button>
      <ul id="event-list"></ul>
    </aside>

    <main id="main">
      <div id="view-empty">
        <p>Select an event or create a new one.</p>
      </div>
      <div id="view-event">
        <h1 id="event-name"></h1>
        <p id="event-total"></p>
        <div id="export-buttons">
          <button id="export-json">Export JSON</button>
          <button id="export-csv">Export CSV</button>
          <button id="export-excel">Export Excel</button>
          <button id="export-pdf">Export PDF</button>
        </div>
        <form id="form-add-donation">
          <div>
              <label for="inp-donor">Donor Name</label>
              <input type="text" id="inp-donor" placeholder="e.g. Jane Wanjiku" />
          </div>
          <div>
              <label for="inp-amount">Amount (KES)</label>
              <input type="number" id="inp-amount" placeholder="0.00" />
          </div>
          <button type="submit">Add Donation</button>
      </form>
        <div id="sort-controls">
          <label for="sort-select">Sort by:</label>
          <select id="sort-select">
              <option value="name">Name</option>
              <option value="amount">Amount</option>
              <option value="date">Date</option>
          </select>
        </div>
        <table id="donations-table">
          <thead>
            <tr>
              <th>Donor</th>
              <th>Amount</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="donations-body"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="modal-new-event">
    <div id="modal-content">
      <h2>New Event</h2>
      <label for="modal-event-name">Event Name</label>
      <input type="text" id="modal-event-name" placeholder="e.g. Mama's Funeral" />
      <label for="modal-event-date">Date</label>
      <input type="date" id="modal-event-date" />
      <button id="modal-confirm">Create</button>
      <button id="modal-cancel">Cancel</button>
    </div>
  </div>
  <div id="modal-edit-donation">
    <div id="modal-edit-content">
      <h2>Edit Donation</h2>
      <label for="edit-donor-name">Donor Name</label>
      <input type="text" id="edit-donor-name" />
      <label for="edit-amount">Amount (KES)</label>
      <input type="number" id="edit-amount" />
      <button id="edit-confirm">Save</button>
      <button id="edit-cancel">Cancel</button>
    </div>
  </div>
</body>
</html>
